// ── FIREBASE — uses globals injected by <script type="module"> in <head> ──────
async function waitFb(timeout=6000) {
  if (window._fbReady) return true;
  return new Promise(res => {
    const t = setTimeout(()=>res(false), timeout);
    window.addEventListener("fbready", ()=>{ clearTimeout(t); res(true); }, {once:true});
  });
}
async function fbGet(coll, id) {
  if (!await waitFb()) return null;
  try {
    const s = await window._fbGetDoc(window._fbDoc(window._fbDb, coll, id));
    return s.exists() ? JSON.parse(s.data().data) : null;
  } catch(e) { console.warn("fbGet",e); return null; }
}
async function fbSet(coll, id, data) {
  if (!await waitFb()) return;
  try { await window._fbSetDoc(window._fbDoc(window._fbDb, coll, id), {data:JSON.stringify(data)}); }
  catch(e) { console.warn("fbSet",e); }
}
async function fbGetAll(coll) {
  if (!await waitFb()) return [];
  try {
    const s = await window._fbGetDocs(window._fbCollection(window._fbDb, coll));
    const r = [];
    s.forEach(d=>{ try { r.push({id:d.id,...JSON.parse(d.data().data)}); } catch(e){} });
    return r;
  } catch(e) { console.warn("fbGetAll",e); return []; }
}
async function fbDel(coll, id) {
  if (!await waitFb()) return;
  try { await window._fbDeleteDoc(window._fbDoc(window._fbDb, coll, id)); }
  catch(e) { console.warn("fbDel",e); }
}

function emptyDaily(segments, subActivities) {
  const d = {};
  (segments||[]).forEach(seg => {
    d[seg.id] = {};
    (subActivities||[]).forEach(sa => { d[seg.id][sa.key] = {done:[],ip:[],plan:[]}; });
  });
  return d;
}

function parseExcel(workbook) {
  const XLSX = window.XLSX;
  const segments = [], subActivities = [];
  const bgDone = {}, bgIp = {};
  workbook.SheetNames.forEach((sheetName, si) => {
    const ws = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1});
    if (rows.length < 2) return;
    let hIdx = -1;
    for (let i=0;i<Math.min(5,rows.length);i++) {
      if (rows[i]&&rows[i][0]==="#"&&rows[i][1]==="Activity"){hIdx=i;break;}
    }
    if (hIdx===-1) return;
    const hdrs = rows[hIdx];
    const units = hdrs.slice(2).filter(Boolean).map(h=>({loc:String(h),type:"–"}));
    // Read TYPE row if present (row immediately after header)
    const typeRowCandidate = rows[hIdx+1];
    if (typeRowCandidate && String(typeRowCandidate[0]||"").trim().toUpperCase()==="TYPE") {
      units.forEach((u,i)=>{
        const t = typeRowCandidate[i+2];
        if (t && String(t).trim() && String(t).trim()!=="–") u.type = String(t).trim();
      });
    }
    const segId = `seg_${si}`;
    segments.push({id:segId,name:sheetName,units});
    bgDone[segId]={}; bgIp[segId]={};
    for (let i=hIdx+1;i<rows.length;i++) {
      const row=rows[i];
      if (!row||!row[1]) continue;
      const actName=String(row[1]);
      if (actName==="TOTAL DONE →"||actName==="IN PROGRESS →") continue;
      if (String(row[0]||"").trim().toUpperCase()==="TYPE") continue;
      let sa=subActivities.find(a=>a.name===actName);
      if (!sa) { sa={key:`act_${subActivities.length+1}`,name:actName}; subActivities.push(sa); }
      bgDone[segId][sa.key]=[]; bgIp[segId][sa.key]=[];
      for (let j=2;j<row.length;j++) {
        const cell=row[j], loc=hdrs[j];
        if (!loc) continue;
        if (cell==="✓") bgDone[segId][sa.key].push(String(loc));
        else if (cell==="▶") bgIp[segId][sa.key].push(String(loc));
      }
    }
  });
  return {segments,subActivities,bgDone,bgIp};
}

// ── IMPORT PANEL ──────────────────────────────────────────────────────────────
function ImportPanel({config,configKey,onDone}) {
  const [preview,setPreview]   = useState(null);
  const [loading,setLoading]   = useState(false);
  const fileRef                = useRef(null);

  function handleFile(e) {
    const file=e.target.files[0]; if (!file||!window.XLSX) return;
    setLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const wb=window.XLSX.read(ev.target.result,{type:"array"});
        setPreview(parseExcel(wb));
      } catch(err){alert("Could not read file: "+err.message);}
      setLoading(false);
    };
    reader.readAsArrayBuffer(file);
  }

  async function confirm() {
    if (!preview) return;
    const newCfg={
      segments:preview.segments,
      subActivities:preview.subActivities,
      bgDone:preview.bgDone,
      bgIp:preview.bgIp,
    };
    lsSet("cfg_"+configKey,newCfg);
    await fbSet("activity_config",configKey,newCfg);
    onDone(newCfg);
  }

  return (
    <div style={{padding:24,maxWidth:580,margin:"0 auto"}}>
      <div style={{background:C.card,borderRadius:12,padding:28,border:`1px solid ${C.border}`,marginTop:10}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}}>📂 Import Excel</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:20}}>
          Excel format: each <b>sheet = segment</b> (Item 1, Item 2…). Row 2 = headers (<code>#, Activity, tower1, tower2…</code>). Rows 3+ = activities.
          {config&&<span style={{color:"#cc2222",display:"block",marginTop:6}}>⚠ Re-importing will reset all data for this activity.</span>}
        </div>
        <input type="file" ref={fileRef} accept=".xlsx,.xls" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()}
          style={{background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",cursor:"pointer",fontWeight:700,fontSize:14}}>
          📂 Choose Excel File
        </button>
        {loading&&<div style={{marginTop:12,color:C.muted,fontSize:13}}>Parsing…</div>}
        {preview&&(
          <div style={{marginTop:20,background:"#f8f9fc",borderRadius:10,padding:18,border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>Preview</div>
            {preview.segments.map(s=>(
              <div key={s.id} style={{fontSize:12,marginBottom:5}}>
                <b>{s.name}</b> — {s.units.length} towers
              </div>
            ))}
            <div style={{fontSize:12,color:C.muted,margin:"10px 0 4px"}}>{preview.subActivities.length} sub-activities:</div>
            {preview.subActivities.map(sa=>(
              <div key={sa.key} style={{fontSize:11,color:C.text,marginBottom:2}}>• {sa.name}</div>
            ))}
            <button onClick={confirm}
              style={{marginTop:16,width:"100%",background:C.green,color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:14}}>
              ✅ Confirm &amp; Load
            </button>
          </div>
        )}
        {config&&(
          <div style={{marginTop:24,borderTop:`1px solid ${C.border}`,paddingTop:20}}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>CURRENT CONFIG</div>
            {config.segments.map(s=>(
              <div key={s.id} style={{fontSize:12,color:C.text,marginBottom:4}}>
                <b>{s.name}</b>: {s.units.length} towers
              </div>
            ))}
            <div style={{fontSize:11,color:C.muted,marginTop:6}}>
              Activities: {config.subActivities.map(sa=>sa.name).join(", ")}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  <div><div class="brand">L<em>&amp;</em>T CONSTRUCTION</div><div style="color:rgba(255,255,255,0.7);font-size:11px;margin-top:4px;">${title}</div></div>
  <div><div class="rpt">TO-DO LIST</div><div class="sub">Generated ${todayStr()}</div></div>

<div class="footer">${tasks.length} task${tasks.length!==1?"s":""} · ${title}</div>
</div></body></html>`;

  function renderPng(html,filename){
    const iframe=document.createElement("iframe");
    iframe.style.cssText="position:fixed;left:-9999px;top:-9999px;width:920px;height:1px;border:none;";
    document.body.appendChild(iframe);
    iframe.contentDocument.open(); iframe.contentDocument.write(html); iframe.contentDocument.close();
    setTimeout(()=>{
      const pg=iframe.contentDocument.querySelector(".page");
      if (!pg||!window.html2canvas){document.body.removeChild(iframe);flash("html2canvas not ready");return;}
      window.html2canvas(pg,{scale:2,useCORS:true,backgroundColor:"#dde2ee"}).then(canvas=>{
        const a=document.createElement("a"); a.download=filename; a.href=canvas.toDataURL("image/png"); a.click();
        document.body.removeChild(iframe); flash("📷 PNG downloaded!");
      }).catch(()=>{document.body.removeChild(iframe);flash("PNG error");});

                        <div style={{flex:1}}>

                          <div style={{display:"flex",gap:7,marginTop:5,alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{background:PRIORITY_CFG[t.priority].bg,color:PRIORITY_CFG[t.priority].fg,
                              border:`1px solid ${PRIORITY_CFG[t.priority].bdr}`,
                              borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                              {PRIORITY_CFG[t.priority].label}

                        <button onClick={()=>deleteTask(mk,t.id)}

                {/* Done tasks */}
                {done.length>0&&(

                    {done.map(t=>(
                      <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,

                        border:"1px solid #d0e8d8",opacity:0.8}}>

                          style={{width:20,height:20,borderRadius:5,background:C.green,flexShrink:0,
                            marginTop:1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,color:"#888",textDecoration:"line-through",lineHeight:1.4}}>{t.task}</div>
                          <div style={{display:"flex",gap:7,marginTop:5,alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{background:PRIORITY_CFG[t.priority].bg,color:PRIORITY_CFG[t.priority].fg,
                              border:`1px solid ${PRIORITY_CFG[t.priority].bdr}`,
                              borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                              {PRIORITY_CFG[t.priority].label}
                            </span>
                            <span style={{fontSize:10,color:C.muted}}>📆 {t.createdAt}</span>
                          </div>
                        </div>
                        <button onClick={()=>deleteTask(mk,t.id)}
                          style={{background:"none",border:"none",color:"#ccc",fontSize:14,
                            cursor:"pointer",padding:"0 2px",flexShrink:0}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}

                {tasks.length===0&&(
                  <div style={{padding:"28px",textAlign:"center",color:C.muted,fontSize:12}}>
                    No tasks this month yet — tap "+ Add Task" to begin
                  </div>

      })}

      {/* Add Task bottom sheet */}
      {showAdd&&(
        <div onClick={e=>{if(e.target===e.currentTarget)setShowAdd(false);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:9999,
            display:"flex",alignItems:"flex-end"}}>
          <div style={{background:C.card,width:"100%",borderRadius:"14px 14px 0 0",padding:22}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <b style={{fontSize:15,color:C.text}}>✅ New Task — {monthLabel(curMK)}</b>
              <button onClick={()=>setShowAdd(false)}
                style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.muted}}>✕</button>

              placeholder="Describe the task…" rows={3} autoFocus
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,

}

// ── GRID TAB ──────────────────────────────────────────────────────────────────
function GridTab({config, cum, daily, cfgKey, onConfigUpdate, flash}) {
  const [seg, setSeg]             = useState(null);
  const [sheet, setSheet]         = useState(null);   // {loc, saIdx}
  const [filter, setFilter]       = useState("all");
  // Local pending changes — not saved to Firebase yet
  const [localBgDone, setLocalBgDone] = useState(null);
  const [localBgIp,   setLocalBgIp]   = useState(null);
  const [dirty,  setDirty]        = useState(false);
  const [saving, setSaving]       = useState(false);

  useEffect(()=>{
    if (!config) return;
    if (!seg) setSeg(config.segments[0]?.id||null);
    // Init local state from config
    setLocalBgDone(JSON.parse(JSON.stringify(config.bgDone||{})));
    setLocalBgIp(JSON.parse(JSON.stringify(config.bgIp||{})));
    setDirty(false);
  },[config]);

  if (!config || !localBgDone) return (
    <div style={{padding:40,textAlign:"center",color:C.muted}}>Loading…</div>
  );

  const sas     = config.subActivities;
  const currSeg = config.segments.find(s=>s.id===seg);
  const allUnits= currSeg?.units||[];

  // ── cell status — reads from local state + daily ─────────────────────────
  function cellStatus(segId, loc, saKey) {
    const bgD = new Set(localBgDone?.[segId]?.[saKey]||[]);
    const bgI = new Set(localBgIp?.[segId]?.[saKey]||[]);
    const dyD = new Set(daily?.[segId]?.[saKey]?.done||[]);
    const dyI = new Set(daily?.[segId]?.[saKey]?.ip||[]);
    if (bgD.has(loc)||dyD.has(loc)) return "done";
    if (bgI.has(loc)||dyI.has(loc)) return "ip";
    return "pending";
  }

  function towerDoneCount(segId, loc) {
    return sas.filter(sa=>cellStatus(segId,loc,sa.key)==="done").length;
  }

  // ── apply changes to LOCAL state only (no Firebase yet) ──────────────────
  function applyLocal(loc, saIdx, newStatus) {
    setLocalBgDone(prev=>{
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[seg]) next[seg]={};
      sas.forEach(sa=>{ if (!next[seg][sa.key]) next[seg][sa.key]=[]; });

      // Smart fill: all activities BEFORE saIdx → Done
      for (let i=0; i<saIdx; i++) {
        const k=sas[i].key;
        if (!next[seg][k].includes(loc)) next[seg][k].push(loc);
      }
      // Tapped activity
      const tapK=sas[saIdx].key;
      if (newStatus==="done") {
        if (!next[seg][tapK].includes(loc)) next[seg][tapK].push(loc);
      } else {
        next[seg][tapK]=next[seg][tapK].filter(t=>t!==loc);
      }
      return next;
    });

    setLocalBgIp(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if (!next[seg]) next[seg]={};
      sas.forEach(sa=>{ if (!next[seg][sa.key]) next[seg][sa.key]=[]; });

      // Smart fill: remove all before from ip
      for (let i=0; i<saIdx; i++) {
        const k=sas[i].key;
        next[seg][k]=next[seg][k].filter(t=>t!==loc);
      }
      const tapK=sas[saIdx].key;
      if (newStatus==="ip") {
        if (!next[seg][tapK].includes(loc)) next[seg][tapK].push(loc);
      } else {
        next[seg][tapK]=next[seg][tapK].filter(t=>t!==loc);
      }
      // pending: remove from both (bgDone already handled above)
      if (newStatus==="pending") {
        next[seg][sas[saIdx].key]=(next[seg][sas[saIdx].key]||[]).filter(t=>t!==loc);
      }
      return next;
    });

    setDirty(true);
    setSheet(null);
  }

  // ── Save to Firebase ──────────────────────────────────────────────────────
  async function saveToFirebase() {
    setSaving(true);
    const newCfg = {...config, bgDone:localBgDone, bgIp:localBgIp};
    lsSet("cfg_"+cfgKey, newCfg);
    await fbSet("activity_config", cfgKey, newCfg);
    onConfigUpdate(newCfg);
    setDirty(false);
    setSaving(false);
    flash("✅ Saved to Firebase");
  }

  function discardChanges() {
    setLocalBgDone(JSON.parse(JSON.stringify(config.bgDone||{})));
    setLocalBgIp(JSON.parse(JSON.stringify(config.bgIp||{})));
    setDirty(false);
    flash("Changes discarded");
  }

  const ss = st=>({
    done:    {bg:"#eafaf0",fg:"#1a7a35",bdr:"#3fb950",icon:"✓"},
    ip:      {bg:"#fff8ec",fg:"#b06000",bdr:"#e09030",icon:"▶"},
    pending: {bg:"#f0f2f8",fg:"#c0c8d8",bdr:"#d8dce8",icon:"○"},
  }[st]||{bg:"#f0f2f8",fg:"#c0c8d8",bdr:"#d8dce8",icon:"○"});

  // ── filter ────────────────────────────────────────────────────────────────
  const filteredUnits = allUnits.filter(u=>{
    if (filter==="all") return true;
    const dc=towerDoneCount(seg,u.loc);
    if (filter==="done")       return dc===sas.length;
    if (filter==="pending")    return dc===0;
    if (filter==="partial")    return dc>0 && dc<sas.length;
    return true;
  });

  const sheetSa = sheet ? sas[sheet.saIdx] : null;
  const sheetSt = sheet ? cellStatus(seg, sheet.loc, sheetSa?.key) : null;

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",position:"relative"}}>

      {/* ── Sticky save bar — floats above grid when dirty ── */}
      {dirty&&(
        <div style={{position:"sticky",top:0,zIndex:50,background:"#1a3a5c",
          padding:"10px 14px",display:"flex",alignItems:"center",gap:10,
          boxShadow:"0 3px 12px rgba(0,0,0,0.25)"}}>
          <span style={{flex:1,fontSize:12,color:"rgba(255,255,255,0.85)",fontWeight:600}}>
            ✏️ Unsaved changes — review then save
          </span>
          <button onClick={discardChanges}
            style={{padding:"7px 14px",borderRadius:7,border:"1px solid rgba(255,255,255,0.3)",
              background:"transparent",color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer",fontWeight:600}}>
            Discard
          </button>
          <button onClick={saveToFirebase} disabled={saving}
            style={{padding:"8px 18px",borderRadius:7,border:"none",
              background:saving?"#888":C.amber,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:700,
              display:"flex",alignItems:"center",gap:6}}>
            {saving ? "⏳ Saving…" : "☁ Save"}
          </button>
        </div>
      )}

      {/* Segment tabs */}
      <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        {config.segments.map(s=>(
          <button key={s.id} onClick={()=>{setSeg(s.id);setSheet(null);}}
            style={{padding:"9px 16px",background:"none",border:"none",cursor:"pointer",whiteSpace:"nowrap",
              fontSize:13,fontWeight:seg===s.id?700:400,color:seg===s.id?C.amber:"#6070a0",
              borderBottom:seg===s.id?`2px solid ${C.amber}`:"2px solid transparent",marginBottom:-1}}>
            {s.name} <span style={{fontSize:10,color:C.muted}}>({s.units.length})</span>
          </button>
        ))}
      </div>

      {/* Filter bar */}
      <div style={{display:"flex",gap:6,padding:"10px 14px",background:"#f8f9fc",
        borderBottom:`1px solid ${C.border}`,flexWrap:"wrap",alignItems:"center"}}>
        {[
          ["all",     "All",           allUnits.length],
          ["done",    "✓ Complete",     allUnits.filter(u=>towerDoneCount(seg,u.loc)===sas.length).length],
          ["partial", "▶ Partial",      allUnits.filter(u=>{const d=towerDoneCount(seg,u.loc);return d>0&&d<sas.length;}).length],
          ["pending", "○ Not Started",  allUnits.filter(u=>towerDoneCount(seg,u.loc)===0).length],
        ].map(([v,lbl,cnt])=>(
          <button key={v} onClick={()=>setFilter(v)}
            style={{padding:"5px 11px",borderRadius:20,border:`1.5px solid ${filter===v?C.amber:C.border}`,
              background:filter===v?"#fff8ec":C.card,color:filter===v?C.amber:C.muted,
              cursor:"pointer",fontSize:11,fontWeight:filter===v?700:500,whiteSpace:"nowrap"}}>
            {lbl} <span style={{opacity:0.7}}>({cnt})</span>
          </button>
        ))}
        <span style={{marginLeft:"auto",fontSize:10,color:C.muted}}>Tap cell → edit</span>
      </div>

      {/* ── Grid table — ACTIVITY rows × TOWER columns ── */}
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <table style={{borderCollapse:"collapse",fontSize:12,
          width:"100%",minWidth:Math.max(300,180+filteredUnits.length*52)}}>
          <thead style={{position:"sticky",top:dirty?41:0,zIndex:10}}>
            <tr style={{background:C.navy}}>
              <th style={{padding:"10px 14px",color:"#fff",fontWeight:700,textAlign:"left",
                position:"sticky",left:0,background:C.navy,zIndex:11,
                minWidth:170,whiteSpace:"nowrap",fontSize:12,
                borderRight:`2px solid rgba(255,255,255,0.2)`}}>
                ACTIVITY
              </th>
              {filteredUnits.map(unit=>(
                <th key={unit.loc}
                  style={{padding:"8px 4px",color:"#fff",fontWeight:800,textAlign:"center",
                    fontSize:11,minWidth:50,borderLeft:`1px solid rgba(255,255,255,0.1)`}}>
                  <div style={{fontFamily:MONO,fontWeight:800,fontSize:11}}>{unit.loc}</div>
                  <div style={{fontSize:8,color:"rgba(255,255,255,0.45)",marginTop:2}}>{unit.type||"–"}</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sas.map((sa,saIdx)=>{
              const bg=saIdx%2===0?"#ffffff":"#f8f9fc";
              return (
                <tr key={sa.key}>
                  <td style={{padding:"9px 14px",fontWeight:600,fontSize:12,color:C.text,
                    background:bg,position:"sticky",left:0,zIndex:1,
                    borderBottom:`1px solid ${C.border}`,
                    borderRight:`2px solid ${C.border}`,whiteSpace:"nowrap",minWidth:170}}>
                    <span style={{fontSize:10,color:C.muted,fontWeight:700,marginRight:5}}>{saIdx+1}.</span>
                    {sa.name}
                  </td>
                  {filteredUnits.map(unit=>{
                    const st=cellStatus(seg,unit.loc,sa.key);
                    const s=ss(st);
                    return (
                      <td key={unit.loc}
                        onClick={()=>setSheet({loc:unit.loc,saIdx})}
                        style={{padding:"5px 3px",textAlign:"center",

                          width:36,height:30,borderRadius:7,background:s.bg,color:s.fg,
                          fontWeight:700,fontSize:14,border:`1.5px solid ${s.bdr}`,
                          boxShadow:st!=="pending"?`0 1px 4px ${s.bdr}44`:"none",
                          transition:"all .1s"}}>
                          {s.icon}
                        </span>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* ── Bottom sheet ── */}
      {sheet&&sheetSa&&(
        <div onClick={e=>{if(e.target===e.currentTarget)setSheet(null);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",
            zIndex:9999,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:C.card,width:"100%",borderRadius:"16px 16px 0 0",
            padding:22,boxShadow:"0 -8px 32px rgba(0,0,0,0.18)"}}>

            {/* Info */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontFamily:MONO,fontSize:20,fontWeight:800,color:C.text}}>{sheet.loc}</span>
                  <span style={{fontSize:11,color:C.muted,fontFamily:MONO}}>
                    {currSeg?.units.find(u=>u.loc===sheet.loc)?.type||""}
                  </span>
                </div>
                <div style={{fontSize:14,color:C.navy,fontWeight:700}}>
                  {sheet.saIdx+1}. {sheetSa.name}
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:3}}>
                  {towerDoneCount(seg,sheet.loc)}/{sas.length} activities done
                </div>
              </div>
              <button onClick={()=>setSheet(null)}
                style={{background:"none",border:"none",fontSize:26,cursor:"pointer",
                  color:C.muted,padding:0,lineHeight:1}}>✕</button>
            </div>

            {/* Single status buttons */}
            <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:0.8,marginBottom:8}}>
              SET THIS ACTIVITY ONLY:
            </div>
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              {[
                {st:"done",    bg:"#eafaf0",fg:"#1a7a35",bdr:"#3fb950",lbl:"✓ Done"},
                {st:"ip",      bg:"#fff8ec",fg:"#b06000",bdr:"#e09030",lbl:"▶ In Progress"},
                {st:"pending", bg:"#f0f2f8",fg:"#9098b0",bdr:"#d0d8e8",lbl:"○ Clear"},
              ].map(o=>(
                <button key={o.st}
                  onClick={()=>applyLocal(sheet.loc,sheet.saIdx,o.st)}
                  style={{flex:1,padding:"12px 4px",borderRadius:10,
                    border:`2px solid ${sheetSt===o.st?o.bdr:"#e0e4ee"}`,
                    background:sheetSt===o.st?o.bg:C.card,
                    color:sheetSt===o.st?o.fg:C.muted,
                    cursor:"pointer",fontWeight:700,fontSize:13}}>
                  {o.lbl}

              ))}
            </div>

            {/* Smart fill */}
            {sheet.saIdx>0&&(
              <div style={{background:"#f0f4fa",borderRadius:12,padding:14,
                border:`1.5px solid #c8d4e8`}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:24}}>⚡</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:4}}>
                      Smart Fill
                    </div>
                    <div style={{fontSize:12,color:C.muted,lineHeight:1.5,marginBottom:12}}>
                      Auto-mark activities <b style={{color:C.text}}>1–{sheet.saIdx}</b> as{" "}
                      <b style={{color:C.green}}>✓ Done</b> for tower{" "}
                      <b style={{fontFamily:MONO,color:C.text}}>{sheet.loc}</b>, then set{" "}
                      <b style={{color:C.text}}>{sheetSa.name}</b> as:
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>applyLocal(sheet.loc,sheet.saIdx,"done")}
                        style={{flex:1,padding:"11px 4px",borderRadius:9,
                          border:`2px solid #3fb950`,background:"#eafaf0",
                          color:"#1a7a35",cursor:"pointer",fontWeight:700,fontSize:13}}>
                        ⚡ Fill + ✓ Done
                      </button>
                      <button onClick={()=>applyLocal(sheet.loc,sheet.saIdx,"ip")}
                        style={{flex:1,padding:"11px 4px",borderRadius:9,
                          border:`2px solid #e09030`,background:"#fff8ec",
                          color:"#b06000",cursor:"pointer",fontWeight:700,fontSize:13}}>
                        ⚡ Fill + ▶ IP
                      </button>
                    </div>
                    <div style={{fontSize:10,color:C.muted,marginTop:8,textAlign:"center"}}>
                      Changes are local — press ☁ Save bar above to sync to Firebase
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── SCHEDULE TAB ──────────────────────────────────────────────────────────────
function ScheduleTab({config, cum, daily, cfgKey, project, mainActivity, date, weather, temp}) {
  const [schedules, setSchedules] = useState(null);
  const [seg, setSeg]             = useState(null);
  const [activeSch, setActiveSch] = useState(null);
  const [showNew, setShowNew]     = useState(false);
  const [form, setForm]           = useState({label:"",from:"",to:"",targetDate:""});
  const [editId, setEditId]       = useState(null);
  const [editForm, setEditForm]   = useState({});
  const [saving, setSaving]       = useState(false);
  const [msg, setMsg]             = useState("");

  const schedKey = "schedule_" + cfgKey;

  useEffect(()=>{
    if (!config) return;
    setSeg(s => s || config.segments[0]?.id || null);
    async function load() {
      let data = await fbGet("dpr_schedule", schedKey);
      if (!data) data = lsGet(schedKey)||{};
      const out = {};
      config.segments.forEach(s=>{ out[s.id]=data[s.id]||[]; });
      setSchedules(out);
    }
    load();
  },[cfgKey, config]);

  async function saveAll(next) {
    setSchedules(next);
    lsSet(schedKey, next);
    await fbSet("dpr_schedule", schedKey, next);
  }

  const flash = m => { setMsg(m); setTimeout(()=>setMsg(""),3000); };

  function towersBetween(segId, from, to) {
    const locs=(config.segments.find(s=>s.id===segId)?.units||[]).map(u=>u.loc);
    const fi=locs.indexOf(from), ti=locs.indexOf(to);
    if (fi===-1||ti===-1) return [];
    return fi<=ti ? locs.slice(fi,ti+1) : locs.slice(ti,fi+1);
  }

  function towerStatus(segId, loc) {
    const res={};
    (config.subActivities||[]).forEach(sa=>{
      const cumDone=new Set([...(cum?.[segId]?.[sa.key]?.done||[]),...(daily?.[segId]?.[sa.key]?.done||[])]);
      const cumIp  =new Set([...(cum?.[segId]?.[sa.key]?.ip  ||[]),...(daily?.[segId]?.[sa.key]?.ip  ||[])].filter(t=>!cumDone.has(t)));
      res[sa.key]=cumDone.has(loc)?"done":cumIp.has(loc)?"ip":"pending";
    });
    return res;
  }

  function overallPct(segId, towers) {
    if (!towers.length||!config.subActivities.length) return 0;
    const total=towers.length*config.subActivities.length;
    const done=towers.reduce((s,loc)=>s+Object.values(towerStatus(segId,loc)).filter(v=>v==="done").length,0);
    return total?Math.round(done/total*100):0;
  }

  async function createSchedule() {
    if (!form.label.trim()||!form.from||!form.to){flash("❌ Fill label, from and to tower");return;}
    setSaving(true);
    const id="sch_"+Date.now();
    const entry={id,label:form.label.trim(),from:form.from,to:form.to,targetDate:form.targetDate,createdAt:todayStr()};
    const next={...schedules,[seg]:[entry,...(schedules[seg]||[])]};
    await saveAll(next);
    setActiveSch(id); setShowNew(false); setForm({label:"",from:"",to:"",targetDate:""});
    setSaving(false); flash("✅ Schedule created");
  }

  async function updateSchedule() {
    if (!editForm.label?.trim()||!editForm.from||!editForm.to){flash("❌ Fill all fields");return;}
    setSaving(true);
    const next={...schedules,[seg]:schedules[seg].map(s=>s.id===editId?{...s,...editForm}:s)};
    await saveAll(next); setEditId(null); setSaving(false); flash("✅ Updated");
  }

  async function deleteSchedule(id) {
    if (!window.confirm("Delete this schedule?")) return;
    const next={...schedules,[seg]:schedules[seg].filter(s=>s.id!==id)};
    await saveAll(next);
    if (activeSch===id) setActiveSch(next[seg]?.[0]?.id||null);
    flash("✅ Deleted");
  }

  function downloadSchedulePNG(active, towers) {
    if (!active||!towers.length||!window.html2canvas){flash("Nothing to export");return;}
    const sas=config.subActivities;
    const currSeg=config.segments.find(s=>s.id===seg);
    const pct=overallPct(seg,towers);
    const ssStyle=st=>({done:{bg:"#eafaf0",fg:"#1a7a35",icon:"✓"},ip:{bg:"#fff8ec",fg:"#b06000",icon:"▶"},pending:{bg:"#f0f2f8",fg:"#9098b0",icon:"○"}}[st]||{bg:"#f0f2f8",fg:"#9098b0",icon:"○"});
    const tableRows=towers.map((loc,ri)=>{
      const unit=currSeg?.units.find(u=>u.loc===loc);
      const st=towerStatus(seg,loc);
      const doneC=Object.values(st).filter(v=>v==="done").length;
      const tPct=sas.length?Math.round(doneC/sas.length*100):0;
      const bg=ri%2===0?"#ffffff":"#f8f9fc";
      const cells=sas.map(sa=>{
        const s=ssStyle(st[sa.key]||"pending");
        return `<td style="padding:8px 10px;text-align:center;border-bottom:1px solid #e0e4ee;background:${bg};">
          <span style="background:${s.bg};color:${s.fg};border-radius:5px;padding:3px 8px;font-weight:700;font-size:12px;">${s.icon}</span></td>`;
      }).join("");
      return `<tr>
        <td style="padding:8px 12px;font-family:'Courier New',monospace;font-weight:700;color:#1a1a2e;border-bottom:1px solid #e0e4ee;background:${bg};">${loc}</td>
        <td style="padding:8px 12px;font-family:'Courier New',monospace;font-size:11px;color:#9098b0;border-bottom:1px solid #e0e4ee;background:${bg};">${unit?.type||"–"}</td>
        ${cells}
        <td style="padding:8px 10px;text-align:center;border-bottom:1px solid #e0e4ee;background:${bg};font-weight:700;font-size:12px;color:${tPct===100?"#1a7a35":tPct>0?"#e07b00":"#9098b0"};">${tPct}%</td>
      </tr>`;
    }).join("");
    const thCells=sas.map(sa=>`<th style="padding:10px 8px;background:#1a3a5c;color:rgba(255,255,255,0.9);font-size:10px;font-weight:700;text-align:center;white-space:nowrap;">${sa.name}</th>`).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Segoe UI',system-ui,sans-serif;background:#dde2ee;padding:24px;}
.page{background:#fff;max-width:1060px;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,0.2);}

.brand{color:#fff;font-size:26px;font-weight:900;letter-spacing:1px;}.brand em{color:#e07b00;font-style:normal;}
.meta{color:rgba(255,255,255,0.75);font-size:11px;margin-top:5px;}
.rhs{text-align:right;}.rpt{color:#fff;font-size:20px;font-weight:900;letter-spacing:2px;}
.sub{color:rgba(255,255,255,0.55);font-size:10px;margin-top:4px;}
.info{padding:14px 28px;background:#f0f4fa;border-bottom:2px solid #1a3a5c;display:flex;gap:28px;flex-wrap:wrap;align-items:center;}
.tag{font-size:12px;color:#1a1a2e;}.tag b{color:#1a3a5c;}
.pbar-wrap{flex:1;min-width:140px;display:flex;align-items:center;gap:10;}

.pbar-fill{height:100%;border-radius:4px;}

.footer{padding:12px 28px;text-align:center;font-size:10px;color:#8090b0;border-top:2px solid #1a3a5c;}
</style></head><body><div class="page">
<div class="hdr">
  <div><div class="brand">L<em>&amp;</em>T CONSTRUCTION</div>
  <div class="meta">${date} &nbsp;·&nbsp; ${weather} &nbsp;·&nbsp; ${temp} &nbsp;·&nbsp; ${project.name}</div></div>
  <div class="rhs"><div class="rpt">SCHEDULE REPORT</div>
  <div class="sub">${mainActivity.name} &nbsp;·&nbsp; ${currSeg?.name}</div></div>
</div>
<div class="info">
  <div class="tag">📋 <b>${active.label}</b></div>
  <div class="tag">📍 <b style="font-family:'Courier New',monospace">${active.from}</b> → <b style="font-family:'Courier New',monospace">${active.to}</b> (${towers.length} towers)</div>
  ${active.targetDate?`<div class="tag">🎯 Target: <b>${active.targetDate}</b></div>`:""}
  <div class="pbar-wrap">
    <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pct>=90?"#1a7a35":pct>=50?"#e07b00":"#1a3a5c"};"></div></div>
    <b style="font-size:13px;color:${pct>=90?"#1a7a35":pct>=50?"#e07b00":"#9098b0"};">${pct}%</b>
  </div>
</div>
<table><thead><tr>
  <th style="background:#22395a;width:80px;">TOWER</th>
  <th style="background:#22395a;width:70px;">TYPE</th>
  ${thCells}
  <th style="background:#22395a;text-align:center;width:60px;">OVERALL</th>
</tr></thead><tbody>${tableRows}</tbody></table>
<div class="footer">Generated: ${date} &nbsp;·&nbsp; ${project.name} &nbsp;·&nbsp; ${mainActivity.name} &nbsp;·&nbsp; ${active.label} &nbsp;·&nbsp; L&amp;T Construction</div>
</div></body></html>`;
    const iframe=document.createElement("iframe");
    iframe.style.cssText="position:fixed;left:-9999px;top:-9999px;width:1140px;height:1px;border:none;";
    document.body.appendChild(iframe);
    iframe.contentDocument.open(); iframe.contentDocument.write(html); iframe.contentDocument.close();
    setTimeout(()=>{
      const pg=iframe.contentDocument.querySelector(".page");
      if (!pg){document.body.removeChild(iframe);flash("PNG error");return;}
      window.html2canvas(pg,{scale:2,useCORS:true,backgroundColor:"#dde2ee"}).then(canvas=>{
        const link=document.createElement("a");
        link.download=`Schedule-${project.name}-${mainActivity.name}-${active.label}-${date}.png`;
        link.href=canvas.toDataURL("image/png"); link.click();
        document.body.removeChild(iframe); flash("📷 PNG downloaded!");
      }).catch(err=>{document.body.removeChild(iframe);flash("PNG error: "+err.message);});
    },600);
  }

  if (!config||!schedules) return (
    <div style={{padding:40,textAlign:"center",color:C.muted}}>Loading schedules…</div>
  );

  const segList = config.segments;
  const currSeg = segList.find(s=>s.id===seg);
  const schList = schedules[seg]||[];
  const active  = schList.find(s=>s.id===activeSch)||schList[0]||null;
  const units   = currSeg?.units||[];
  const towers  = active?towersBetween(seg,active.from,active.to):[];
  const pct     = active?overallPct(seg,towers):0;
  const sStyle  = st=>({done:{bg:"#eafaf0",fg:"#1a7a35",bdr:"#3fb950",icon:"✓"},ip:{bg:"#fff8ec",fg:"#b06000",bdr:"#e09030",icon:"▶"},pending:{bg:"#f0f2f8",fg:"#c0c8d8",bdr:"#d8dce8",icon:"○"}}[st]||{bg:"#f0f2f8",fg:"#c0c8d8",bdr:"#d8dce8",icon:"○"});

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif"}}>

      {/* Segment tabs */}
      <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        {segList.map(s=>(
          <button key={s.id} onClick={()=>{setSeg(s.id);setActiveSch(null);setShowNew(false);setEditId(null);}}
            style={{padding:"9px 16px",background:"none",border:"none",cursor:"pointer",whiteSpace:"nowrap",
              fontSize:13,fontWeight:seg===s.id?700:400,color:seg===s.id?C.amber:"#6070a0",
              borderBottom:seg===s.id?`2px solid ${C.amber}`:"2px solid transparent",marginBottom:-1}}>
            {s.name} <span style={{fontSize:10,color:C.muted}}>({s.units.length})</span>
          </button>
        ))}
      </div>

      <div style={{padding:"14px 14px 0"}}>
        {/* Schedule pill tabs */}
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {schList.map(s=>{
            const isAct=activeSch===s.id||(activeSch===null&&s===schList[0]);
            return (
              <button key={s.id} onClick={()=>{setActiveSch(s.id);setShowNew(false);setEditId(null);}}
                style={{padding:"6px 14px",borderRadius:20,
                  border:`1.5px solid ${isAct?C.amber:C.border}`,
                  background:isAct?"#fff8ec":C.card,color:isAct?C.amber:C.muted,
                  cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>
                {s.label}
              </button>
            );
          })}
          <button onClick={()=>{setShowNew(!showNew);setEditId(null);}}
            style={{padding:"6px 14px",borderRadius:20,border:`1.5px dashed ${C.amber}`,
              background:"none",color:C.amber,cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
            + New Schedule
          </button>
        </div>

        {/* New schedule form */}
        {showNew&&(
          <div style={{background:C.card,borderRadius:12,padding:16,border:`1.5px solid ${C.amber}`,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>📅 New Schedule</div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>LABEL *</div>
                <input value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))}
                  placeholder="e.g. Week 15 Plan"
                  style={{width:"100%",padding:"9px 12px",borderRadius:7,border:`1px solid ${C.border}`,
                    fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>FROM *</div>
                  <select value={form.from} onChange={e=>setForm(f=>({...f,from:e.target.value}))}
                    style={{width:"100%",padding:"9px 10px",borderRadius:7,border:`1px solid ${C.border}`,
                      fontSize:13,color:C.text,background:C.card}}>
                    <option value="">— Select —</option>
                    {units.map(u=><option key={u.loc} value={u.loc}>{u.loc}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>TO *</div>
                  <select value={form.to} onChange={e=>setForm(f=>({...f,to:e.target.value}))}
                    style={{width:"100%",padding:"9px 10px",borderRadius:7,border:`1px solid ${C.border}`,
                      fontSize:13,color:C.text,background:C.card}}>
                    <option value="">— Select —</option>
                    {units.map(u=><option key={u.loc} value={u.loc}>{u.loc}</option>)}
                  </select>
                </div>
              </div>
              <div>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>TARGET DATE</div>
                <input type="date" value={form.targetDate} onChange={e=>setForm(f=>({...f,targetDate:e.target.value}))}
                  style={{width:"100%",padding:"9px 12px",borderRadius:7,border:`1px solid ${C.border}`,
                    fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={createSchedule} disabled={saving}
                style={{flex:1,background:C.amber,color:"#fff",border:"none",borderRadius:8,
                  padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13}}>
                {saving?"Saving…":"Create"}
              </button>
              <button onClick={()=>{setShowNew(false);setForm({label:"",from:"",to:"",targetDate:""}); }}
                style={{background:C.card,color:C.muted,border:`1px solid ${C.border}`,
                  borderRadius:8,padding:"10px 16px",cursor:"pointer",fontSize:13}}>
                Cancel
              </button>
            </div>

            <div style={{fontSize:36,marginBottom:10}}>📅</div>
            <div style={{fontSize:14,marginBottom:6}}>No schedules yet</div>
            <div style={{fontSize:12}}>Tap "+ New Schedule" to plan a tower range</div>
          </div>
        )}
      </div>

      {/* Active schedule */}
      {active&&(
        <div style={{padding:"0 14px 14px"}}>
          {/* Header card */}
          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.border}`,marginBottom:12}}>
            {editId===active.id?(
              /* Edit mode */
              <div>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
                  <div>
                    <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>LABEL</div>
                    <input value={editForm.label||""} onChange={e=>setEditForm(f=>({...f,label:e.target.value}))}
                      style={{width:"100%",padding:"9px 12px",borderRadius:7,border:`1px solid ${C.border}`,
                        fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>FROM</div>
                      <select value={editForm.from||""} onChange={e=>setEditForm(f=>({...f,from:e.target.value}))}
                        style={{width:"100%",padding:"9px 10px",borderRadius:7,border:`1px solid ${C.border}`,
                          fontSize:13,color:C.text,background:C.card}}>
                        {units.map(u=><option key={u.loc} value={u.loc}>{u.loc}</option>)}
                      </select>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>TO</div>
                      <select value={editForm.to||""} onChange={e=>setEditForm(f=>({...f,to:e.target.value}))}
                        style={{width:"100%",padding:"9px 10px",borderRadius:7,border:`1px solid ${C.border}`,
                          fontSize:13,color:C.text,background:C.card}}>
                        {units.map(u=><option key={u.loc} value={u.loc}>{u.loc}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:4}}>TARGET DATE</div>
                    <input type="date" value={editForm.targetDate||""} onChange={e=>setEditForm(f=>({...f,targetDate:e.target.value}))}
                      style={{width:"100%",padding:"9px 12px",borderRadius:7,border:`1px solid ${C.border}`,
                        fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={updateSchedule} disabled={saving}
                    style={{flex:1,background:C.green,color:"#fff",border:"none",borderRadius:8,
                      padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13}}>
                    {saving?"Saving…":"Save Changes"}
                  </button>
                  <button onClick={()=>setEditId(null)}
                    style={{background:C.card,color:C.muted,border:`1px solid ${C.border}`,

                  </button>
                </div>
              </div>
            ):(
              /* View mode */
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{fontSize:16,fontWeight:800,color:C.text}}>{active.label}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>downloadSchedulePNG(active,towers)}

                        padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:700}}>
                      📷 PNG
                    </button>
                    <button onClick={()=>{setEditId(active.id);setEditForm({label:active.label,from:active.from,to:active.to,targetDate:active.targetDate||""});}}
                      style={{background:"#eef0f7",color:C.navy,border:`1px solid ${C.border}`,
                        borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>
                      ✏️ Edit
                    </button>
                    <button onClick={()=>deleteSchedule(active.id)}
                      style={{background:"#fff0f0",color:"#cc2222",border:"1px solid #ffaaaa",
                        borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>
                      🗑
                    </button>
                  </div>
                </div>
                <div style={{fontSize:12,color:C.muted,marginBottom:10}}>
                  📍 <b style={{color:C.text,fontFamily:MONO}}>{active.from}</b> →{" "}
                  <b style={{color:C.text,fontFamily:MONO}}>{active.to}</b>
                  <span style={{marginLeft:6}}>({towers.length} towers)</span>
                  {active.targetDate&&(
                    <span style={{marginLeft:16}}>🎯 <b style={{color:C.text}}>{active.targetDate}</b></span>
                  )}
                  <span style={{marginLeft:16,fontSize:11,color:C.muted}}>Created: {active.createdAt}</span>
                </div>
                {/* Progress bar */}
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,background:"#e0e4ee",borderRadius:4,height:7,overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",
                      background:pct>=90?C.green:pct>=50?C.amber:C.navy,transition:"width .3s"}}/>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,minWidth:55,textAlign:"right",
                    color:pct>=90?C.green:pct>=50?C.amber:C.muted}}>
                    {pct}% done
                  </span>
                </div>
              </div>
            )}
          </div>

          {/* Tower status table */}
          {towers.length>0&&(
            <div style={{overflowX:"auto",borderRadius:12,border:`1px solid ${C.border}`}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,
                minWidth:Math.max(300,90+config.subActivities.length*50)}}>
                <thead style={{position:"sticky",top:0,zIndex:5}}>
                  <tr style={{background:C.navy}}>
                    <th style={{padding:"10px 12px",color:"#fff",fontWeight:700,textAlign:"left",
                      whiteSpace:"nowrap",position:"sticky",left:0,background:C.navy,zIndex:6,
                      borderRight:`1px solid rgba(255,255,255,0.15)`}}>

                    </th>
                    <th style={{padding:"10px 10px",color:"rgba(255,255,255,0.65)",fontWeight:500,
                      textAlign:"left",whiteSpace:"nowrap",fontSize:10,
                      borderRight:`1px solid rgba(255,255,255,0.1)`}}>
                      TYPE
                    </th>
                    {config.subActivities.map((sa,i)=>(
                      <th key={sa.key} title={sa.name}
                        style={{padding:"10px 6px",color:"rgba(255,255,255,0.9)",fontWeight:600,
                          textAlign:"center",fontSize:10,minWidth:46,
                          borderLeft:`1px solid rgba(255,255,255,0.1)`}}>
                        {i+1}
                      </th>
                    ))}
                    <th style={{padding:"10px 8px",color:"rgba(255,255,255,0.65)",fontWeight:600,
                      textAlign:"center",fontSize:10,minWidth:40}}>
                      %
                    </th>
                  </tr>
                  {/* Activity name sub-row */}
                  <tr style={{background:"#e8edf8",borderBottom:`2px solid ${C.border}`}}>
                    <td style={{padding:"3px 12px",fontSize:9,color:C.navy,fontWeight:700,
                      position:"sticky",left:0,background:"#e8edf8",zIndex:6,
                      borderRight:`1px solid ${C.border}`}}>
                      {towers.length} towers
                    </td>
                    <td style={{borderRight:`1px solid ${C.border}`}}></td>
                    {config.subActivities.map(sa=>(
                      <td key={sa.key} style={{padding:"3px 3px",fontSize:9,color:C.navy,fontWeight:600,
                        textAlign:"center",borderLeft:`1px solid ${C.border}`,lineHeight:1.2,
                        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:46}}>
                        {sa.name.length>8?sa.name.slice(0,7)+"…":sa.name}
                      </td>
                    ))}
                    <td></td>
                  </tr>
                </thead>
                <tbody>
                  {towers.map((loc,ri)=>{
                    const unit  =currSeg?.units.find(u=>u.loc===loc);
                    const st    =towerStatus(seg,loc);
                    const doneC =Object.values(st).filter(v=>v==="done").length;
                    const tPct  =config.subActivities.length?Math.round(doneC/config.subActivities.length*100):0;
                    const bg    =ri%2===0?"#ffffff":"#f8f9fc";
                    return (
                      <tr key={loc}>
                        <td style={{padding:"8px 12px",fontFamily:MONO,fontWeight:700,color:C.text,
                          borderBottom:`1px solid ${C.border}`,background:bg,
                          position:"sticky",left:0,zIndex:1,whiteSpace:"nowrap",
                          borderRight:`1px solid ${C.border}`}}>
                          {loc}
                        </td>
                        <td style={{padding:"8px 10px",fontFamily:MONO,fontSize:10,color:C.muted,
                          borderBottom:`1px solid ${C.border}`,background:bg,whiteSpace:"nowrap",
                          borderRight:`1px solid ${C.border}`}}>
                          {unit?.type||"–"}
                        </td>
                        {config.subActivities.map(sa=>{
                          const s=sStyle(st[sa.key]||"pending");
                          return (
                            <td key={sa.key} style={{padding:"6px 4px",textAlign:"center",
                              borderBottom:`1px solid ${C.border}`,borderLeft:`1px solid #eef0f7`,
                              background:bg}}>
                              <span style={{background:s.bg,color:s.fg,borderRadius:6,
                                padding:"3px 7px",fontWeight:700,fontSize:13,
                                border:`1.5px solid ${s.bdr}`,display:"inline-block",
                                boxShadow:st[sa.key]!=="pending"?`0 1px 4px ${s.bdr}44`:"none"}}>
                                {s.icon}
                              </span>
                            </td>
                          );
                        })}
                        <td style={{padding:"8px 8px",textAlign:"center",
                          borderBottom:`1px solid ${C.border}`,background:bg,
                          fontWeight:700,fontSize:11,
                          color:tPct===100?C.green:tPct>0?C.amber:C.muted}}>
                          {tPct}%
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                {/* Summary footer */}
                <tfoot>
                  <tr style={{background:"#eef0f7"}}>
                    <td colSpan={2} style={{padding:"9px 12px",fontWeight:700,fontSize:12,color:C.text,
                      position:"sticky",left:0,background:"#eef0f7"}}>
                      TOTAL ({towers.length})
                    </td>
                    {config.subActivities.map(sa=>{
                      const dC=towers.filter(loc=>towerStatus(seg,loc)[sa.key]==="done").length;
                      const iC=towers.filter(loc=>towerStatus(seg,loc)[sa.key]==="ip").length;
                      return (
                        <td key={sa.key} style={{padding:"8px 4px",textAlign:"center"}}>
                          <div style={{fontSize:11,fontWeight:700,color:C.green}}>✓{dC}</div>
                          {iC>0&&<div style={{fontSize:10,color:C.yellow}}>▶{iC}</div>}
                          <div style={{fontSize:10,color:C.muted}}>○{towers.length-dC-iC}</div>
                        </td>
                      );
                    })}
                    <td style={{padding:"8px 8px",textAlign:"center",fontWeight:700,fontSize:13,
                      color:pct>=90?C.green:pct>=50?C.amber:C.muted}}>
                      {pct}%
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>
          )}

          {active&&towers.length===0&&(
            <div style={{textAlign:"center",padding:30,color:"#cc2222",fontSize:13,
              background:C.card,borderRadius:12,border:`1px solid #ffaaaa`}}>
              ⚠ Tower range not found. Please edit the schedule.
            </div>
          )}
        </div>
      )}

      {msg&&(
        <div style={{margin:"0 14px 14px",padding:"10px 16px",borderRadius:8,
          background:msg.startsWith("✅")?"#eafaf0":"#fff0f0",
          color:msg.startsWith("✅")?"#1a7a35":"#cc2222",
          border:`1px solid ${msg.startsWith("✅")?"#3fb950":"#ffaaaa"}`,
          fontWeight:600,fontSize:13}}>
          {msg}
        </div>
      )}
    </div>
  );
}

// ── MANPOWER TAB ──────────────────────────────────────────────────────────────
function prevDateStr(dateStr) {
  const [yr,mo,dy] = dateStr.split("-").map(Number);
  const d = new Date(yr, mo-1, dy-1); // local — no UTC timezone issue
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function ManpowerTab({config, cfgKey, project, mainActivity, date}) {
  const mpKey    = `mp_${cfgKey}_${date}`;
  const eqCfgKey = `mp_eq_cfg_${cfgKey}`;

  const [entries,       setEntries]       = useState([]);
  const [equipment,     setEquipment]     = useState({});
  const [eqTypes,       setEqTypes]       = useState(["Crane","Loader"]);
  const [mpSeg,         setMpSeg]         = useState(null);
  const [newEqName,     setNewEqName]     = useState("");
  const [showAddEq,     setShowAddEq]     = useState(false);
  const [copied,        setCopied]        = useState(false);
  const [saving,        setSaving]        = useState(false);
  const [msg,           setMsg]           = useState("");
  const [loading,       setLoading]       = useState(true);
  const [copyModal,     setCopyModal]     = useState(false); // fallback modal
  const [copyModalText, setCopyModalText] = useState("");

  const flash = m => { setMsg(m); setTimeout(()=>setMsg(""),3000); };

  useEffect(()=>{
    if (!config) return;
    setMpSeg(config.segments[0]?.id||null);
    async function load() {
      setLoading(true);
      const eqCfg = await fbGet("mp_eq_config",eqCfgKey)||lsGet(eqCfgKey);
      if (eqCfg?.types) setEqTypes(eqCfg.types);
      const mpData = await fbGet("dpr_manpower",mpKey)||lsGet(mpKey);
      if (mpData) { setEntries(mpData.entries||[]); setEquipment(mpData.equipment||{}); }
      else        { setEntries([]); setEquipment({}); }
      setLoading(false);
    }
    load();
  },[cfgKey,date,config]);

  async function persist(e,eq) {
    const data={entries:e,equipment:eq,date,savedAt:new Date().toISOString()};
    lsSet(mpKey,data);
    await fbSet("dpr_manpower",mpKey,data);
  }
  async function saveEqTypes(types) {
    lsSet(eqCfgKey,{types});
    await fbSet("mp_eq_config",eqCfgKey,{types});
  }

  // ── Yesterday's plan → today's work ──────────────────────────────────────
  async function loadFromPlan() {
    const yStr = prevDateStr(date);
    const yKey = `${cfgKey}_${yStr}`;
    flash("⏳ Loading plan from "+yStr+"…");
    let yData = await fbGet("dpr_daily",yKey);
    if (!yData) yData = lsGet("daily_"+yKey);
    if (!yData) { flash("❌ No plan found for "+yStr); return; }
    const newEntries=[...entries]; let added=0;
    config.segments.forEach(seg=>{
      config.subActivities.forEach(sa=>{
        const planLocs=yData[seg.id]?.[sa.key]?.plan||[];
        planLocs.forEach(loc=>{
          if (!newEntries.some(e=>e.segId===seg.id&&e.loc===loc&&e.activity===sa.name)) {
            newEntries.push({
              id:`e_${Date.now()}_${Math.random().toString(36).slice(2)}`,
              segId:seg.id,segName:seg.name,loc,activity:sa.name,headcount:"",target:""
            });
            added++;
          }
        });
      });
    });
    if (!added){flash("❌ No plan entries in "+yStr);return;}
    setEntries(newEntries); await persist(newEntries,equipment);
    flash(`✅ ${added} location${added!==1?"s":""} loaded from ${yStr}`);
  }

  function addRow() {
    const seg=config.segments[0],sa=config.subActivities[0];
    const next=[...entries,{id:`e_${Date.now()}`,segId:seg?.id||"",segName:seg?.name||"",loc:"",activity:sa?.name||"",headcount:"",target:""}];
    setEntries(next); persist(next,equipment);
  }
  function updateEntry(id,field,val) {
    const next=entries.map(e=>{
      if (e.id!==id) return e;
      if (field==="segId"){const seg=config.segments.find(s=>s.id===val);return {...e,segId:val,segName:seg?.name||"",loc:""};}
      return {...e,[field]:val};
    });
    setEntries(next); persist(next,equipment);
  }
  function removeEntry(id){const next=entries.filter(e=>e.id!==id);setEntries(next);persist(next,equipment);}
  function updateEquipment(segId,name,val){
    const next={...equipment,[segId]:{...(equipment[segId]||{}),[name]:val}};
    setEquipment(next);persist(entries,next);
  }
  async function addEquipmentType(){
    if (!newEqName.trim()||eqTypes.includes(newEqName.trim())){flash("Already exists");return;}
    const next=[...eqTypes,newEqName.trim()];setEqTypes(next);await saveEqTypes(next);
    setNewEqName("");setShowAddEq(false);flash("✅ Added");
  }
  async function removeEquipmentType(name){
    if (!window.confirm(`Remove "${name}"?`)) return;
    const next=eqTypes.filter(t=>t!==name);setEqTypes(next);await saveEqTypes(next);
    const newEq={...equipment};Object.keys(newEq).forEach(sid=>{if(newEq[sid])delete newEq[sid][name];});
    setEquipment(newEq);persist(entries,newEq);flash("✅ Removed");
  }

  const totalMen=entries.reduce((s,e)=>s+(parseInt(e.headcount)||0),0);

  // ── Build copy text ───────────────────────────────────────────────────────
  function buildText() {
    const lines=[];
    lines.push(`📋 MANPOWER REPORT`);
    lines.push(`📅 ${date}  |  ${project.name}  |  ${mainActivity.name}`);
    lines.push("─".repeat(38));
    config.segments.forEach(seg=>{
      const rows=entries.filter(e=>e.segId===seg.id&&parseInt(e.headcount)>0);
      if (!rows.length) return;
      lines.push(`\n▶ ${seg.name}`);
      rows.forEach(e=>{
        const marked=parseInt(e.headcount)||0;
        const target=parseInt(e.target)||0;
        const ratio=target>0?`${marked}/${target}${marked>=target?"✅":"❌"}`:`${marked}`;
        const tt=config.segments.find(s=>s.id===e.segId)?.units.find(u=>u.loc===e.loc)?.type;
        const ttStr=(tt&&tt!=="–")?` (${tt})`:"";
        lines.push(`  ${e.loc}${ttStr}  ${e.activity} : ${ratio}`);
      });
      const sub=rows.reduce((s,e)=>s+(parseInt(e.headcount)||0),0);
      lines.push(`  Subtotal : ${sub}`);
    });
    lines.push(`\n${"─".repeat(38)}`);
    lines.push(`TOTAL : ${totalMen}`);
    // Equipment
    const hasEq=config.segments.some(seg=>eqTypes.some(t=>parseInt((equipment[seg.id]||{})[t]||0)>0));
    if (hasEq) {
      lines.push(`\n🚧 EQUIPMENT:`);
      config.segments.forEach(seg=>{
        const eq=equipment[seg.id]||{};
        const segHas=eqTypes.some(t=>parseInt(eq[t]||0)>0);
        if (!segHas) return;
        lines.push(`  ${seg.name}:`);
        eqTypes.forEach(t=>{if(parseInt(eq[t]||0)>0)lines.push(`    ${t} : ${eq[t]}`);});
      });
    }
    return lines.join("\n");
  }

  // ── Copy with 3-level fallback ────────────────────────────────────────────
  function copyText() {
    const txt = buildText();
    // Level 1: Modern clipboard API (works on HTTPS)
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(txt)
        .then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);})
        .catch(()=>execCopy(txt));
      return;
    }
    execCopy(txt);
  }

  function execCopy(txt) {
    // Level 2: execCommand — works on local files in Chrome/Samsung Browser
    const ta=document.createElement("textarea");
    ta.value=txt;
    ta.style.cssText="position:fixed;top:0;left:0;width:100%;height:100px;opacity:0.01;z-index:99999;";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try {
      const ok=document.execCommand("copy");
      document.body.removeChild(ta);
      if (ok){setCopied(true);setTimeout(()=>setCopied(false),2500);}
      else showModal(txt);
    } catch(e) {
      document.body.removeChild(ta);
      showModal(txt);
    }
  }

  function showModal(txt) {
    // Level 3: Show modal with text pre-selected so user can long-press copy
    setCopyModalText(txt);
    setCopyModal(true);
  }

  // PNG
  function downloadPNG() {
    if (!window.html2canvas){flash("html2canvas not loaded");return;}
    const blocks=config.segments.map(seg=>({
      seg,eq:equipment[seg.id]||{},
      rows:entries.filter(e=>e.segId===seg.id),
      sub:entries.filter(e=>e.segId===seg.id).reduce((s,e)=>s+(parseInt(e.headcount)||0),0)
    }));
    const tbody=blocks.map(({seg,rows,sub,eq})=>{
      if (!rows.length&&!eqTypes.some(t=>parseInt(eq[t]||0)>0)) return "";
      const rr=rows.map((e,ri)=>{
        const marked=parseInt(e.headcount)||0;
        const target=parseInt(e.target)||0;
        const hasTarget=target>0;
        const ok=hasTarget&&marked>=target;
        const ratio=hasTarget?`${marked}/${target}`:`${marked}`;
        const badge=hasTarget?(ok?`<span style="color:#1a7a35;font-weight:900;font-size:14px;">✅</span>`:`<span style="color:#cc2222;font-weight:900;font-size:14px;">❌</span>`):"";
        const tt=config.segments.find(s=>s.id===e.segId)?.units.find(u=>u.loc===e.loc)?.type;
        const ttHtml=(tt&&tt!=="–")?`<div style="font-size:10px;font-weight:600;color:#5a6a8a;margin-top:2px;">${tt}</div>`:"";
        return `<tr style="background:${ri%2===0?"#fff":"#f8f9fc"}">
        <td style="padding:9px 16px;font-family:monospace;font-weight:700;color:#1a1a2e;border-bottom:1px solid #e8edf8">${e.loc||"—"}${ttHtml}</td>
        <td style="padding:9px 16px;color:#1a1a2e;border-bottom:1px solid #e8edf8">${e.activity||"—"}</td>
        <td style="padding:9px 16px;text-align:right;font-weight:800;font-size:14px;color:#1a3a5c;border-bottom:1px solid #e8edf8;white-space:nowrap;">${ratio} ${badge}</td>
      </tr>`;
      }).join("");
      const er=eqTypes.filter(t=>parseInt(eq[t]||0)>0).map(t=>`<tr style="background:#f0f4fa">
        <td colspan="2" style="padding:7px 16px;color:#5a6a8a;font-size:12px;border-bottom:1px solid #e8edf8">🚧 ${t}</td>
        <td style="padding:7px 16px;text-align:right;font-weight:700;color:#5a6a8a;font-size:12px;border-bottom:1px solid #e8edf8">${eq[t]}</td>
      </tr>`).join("");
      return `<tr><td colspan="3" style="padding:0">
        <div style="background:#1a3a5c;padding:10px 16px;color:#fff;font-weight:700;font-size:13px">${seg.name}</div></td></tr>
        ${rr}${er}
        <tr style="background:#eef0f7">
          <td colspan="2" style="padding:9px 16px;font-weight:700;color:#1a3a5c">Subtotal</td>
          <td style="padding:9px 16px;text-align:right;font-weight:900;font-size:16px;color:#1a3a5c">${sub}</td>
        </tr><tr><td colspan="3" style="padding:5px"></td></tr>`;
    }).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>

// ── PLANNING TAB ──────────────────────────────────────────────────────────────
function getISOWeek(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  return Math.ceil(((d-new Date(Date.UTC(d.getUTCFullYear(),0,1)))/86400000+1)/7);
}
function getISOYear(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  return d.getUTCFullYear();
}
function weekStart(yr,wk){
  const jan4=new Date(Date.UTC(yr,0,4));
  const dow=jan4.getUTCDay()||7;
  return new Date(jan4.getTime()-(dow-1)*86400000+(wk-1)*7*86400000);
}

function PlanningTab({config,cum,daily,cfgKey,project,mainActivity}){
  const planKey=`planning_${cfgKey}`;
  const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const pad=n=>String(n).padStart(2,"0");
  const fmtD=ds=>{const[,m,d]=ds.split("-").map(Number);return`${d} ${MO[m-1]}`;};

  const [planData, setPlanData]=useState(null);
  const [seg,      setSeg]     =useState(null);
  const [viewSel,  setViewSel] =useState("all");
  const [filterAct,setFilterAct]=useState("all");
  const [sheet,    setSheet]   =useState(null);
  const [pickDate, setPickDate]=useState("");
  const [pickWk,   setPickWk]  =useState("");
  const [dlPanel,  setDlPanel] =useState(false);
  const [dlScope,  setDlScope] =useState({type:"current"}); // {type:"current"|"weeks"|"month"|"3month"|"daterange", weeks:[], month:"", from:"", to:""}
  const [cpModal,  setCpModal] =useState(false);
  const [cpText,   setCpText]  =useState("");
  const [msg,      setMsg]     =useState("");

  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),2000);};
  const now=new Date();
  const curWk=getISOWeek(now),curYr=getISOYear(now);

  const weekTabs=useMemo(()=>{
    const t=[];
    for(let i=-1;i<=7;i++){
      let wk=curWk+i,yr=curYr;
      if(wk<1){yr--;wk+=52;} if(wk>52){yr++;wk-=52;}
      const ws=weekStart(yr,wk);
      t.push({key:`W${pad(wk)}`,sub:`${ws.getUTCDate()} ${MO[ws.getUTCMonth()]}`,yr,wk});
    }
    return t;
  },[]);

  const monthTabs=useMemo(()=>{
    const t=[];
    for(let i=-1;i<=5;i++){
      const d=new Date(now.getFullYear(),now.getMonth()+i,1);
      t.push({key:`${d.getFullYear()}-${pad(d.getMonth()+1)}`,label:`${MO[d.getMonth()]} ${d.getFullYear()}`});
    }
    return t;
  },[]);

  useEffect(()=>{
    if(!config) return;
    setSeg(config.segments[0]?.id||null);
    async function load(){
      const saved=await fbGet("dpr_planning",planKey)||lsGet(planKey);
      setPlanData(saved||{});
    }
    load();
  },[cfgKey,config]);

  async function savePlan(next){
    setPlanData(next);lsSet(planKey,next);
    await fbSet("dpr_planning",planKey,next);
  }

  // ── Status helpers ──────────────────────────────────────────────────────
  function isDone(sId,loc,saKey){
    return new Set([...(cum?.[sId]?.[saKey]?.done||[]),...(daily?.[sId]?.[saKey]?.done||[])]).has(loc);
  }
  function isIp(sId,loc,saKey){
    const done=new Set([...(cum?.[sId]?.[saKey]?.done||[]),...(daily?.[sId]?.[saKey]?.done||[])]);
    const ip=new Set([...(cum?.[sId]?.[saKey]?.ip||[]),...(daily?.[sId]?.[saKey]?.ip||[])]);
    return !done.has(loc)&&ip.has(loc);
  }
  function getPlan(sId,loc,saKey){return planData?.[sId]?.[loc]?.[saKey]||null;}

  // ── Does a plan match a given viewSel? ─────────────────────────────────
  function planMatchesSel(plan,sel){
    if(sel==="all"||sel==="3m") return true;
    if(!plan) return false;
    if(sel.startsWith("W")){
      if(plan.type==="week") return plan.value===sel;
      if(plan.type==="day"){
        const[y,m,d]=plan.value.split("-").map(Number);
        return `W${pad(getISOWeek(new Date(y,m-1,d)))}`===sel;
      }
    } else {
      // month "2026-04"
      if(plan.type==="day") return plan.value.startsWith(sel);
      if(plan.type==="week"){
        const yr=parseInt(sel.split("-")[0]);
        const ws=weekStart(yr,parseInt(plan.value.slice(1)));
        return `${ws.getUTCFullYear()}-${pad(ws.getUTCMonth()+1)}`===sel;
      }
    }
    return false;
  }

  // Does this tower/activity pair match current view?
  function matchesView(plan){return planMatchesSel(plan,viewSel);}

  const bandColors=["#fff9c4","#fce4ec","#e3f2fd","#e8f5e9","#f3e5f5","#fff8e1"];
  function monthBand(plan){
    if(!plan) return null;
    let mo="";
    if(plan.type==="day") mo=plan.value.slice(0,7);
    if(plan.type==="week"){
      const ws=weekStart(curYr,parseInt(plan.value.slice(1)));
      mo=`${ws.getUTCFullYear()}-${pad(ws.getUTCMonth()+1)}`;
    }
    const idx=monthTabs.findIndex(m=>m.key===mo);
    return idx>=0?bandColors[idx%bandColors.length]:null;
  }

  function cellInfo(sId,loc,saKey){
    if(isDone(sId,loc,saKey)) return{text:"✓",bg:"#eafaf0",fg:"#1a7a35",bdr:"#3fb950",bold:true,dim:false};
    const plan=getPlan(sId,loc,saKey);
    const dim=viewSel!=="all"&&viewSel!=="3m"&&!matchesView(plan);
    if(plan){
      const txt=plan.type==="day"?fmtD(plan.value):plan.value;
      const bg=viewSel==="3m"?(monthBand(plan)||"#fff9c4"):"#fff9c4";
      return{text:txt,bg:dim?"#f5f5f5":bg,fg:dim?"#ccc":"#e65100",bdr:dim?"#e0e0e0":"#f9a825",bold:!dim,dim};
    }
    if(isIp(sId,loc,saKey)) return{text:"▶",bg:"#fff8ec",fg:"#b06000",bdr:"#e09030",bold:false,dim:false};
    return{text:"",bg:"transparent",fg:"transparent",bdr:"transparent",bold:false,dim:false};

  // ── Cell tap: quick assign when week selected ────────────────────────────
  async function handleCellTap(sId,loc,saKey,saName){
    if(isDone(sId,loc,saKey)) return;
    if(viewSel.startsWith("W")){
      const existing=getPlan(sId,loc,saKey);
      const next=JSON.parse(JSON.stringify(planData||{}));
      if(!next[sId])next[sId]={};
      if(!next[sId][loc])next[sId][loc]={};
      if(existing?.type==="week"&&existing?.value===viewSel){
        delete next[sId][loc][saKey];
      } else {
        next[sId][loc][saKey]={type:"week",value:viewSel};
      }
      await savePlan(next);
    } else {
      const p=getPlan(sId,loc,saKey);
      setPickDate(p?.type==="day"?p.value:"");
      setPickWk(p?.type==="week"?p.value:"");
      setSheet({loc,saKey,saName,segId:sId});
    }
  }

  async function applyPlan(){
    if(!pickDate&&!pickWk){flash("Pick a date or week");return;}
    const next=JSON.parse(JSON.stringify(planData||{}));
    const{segId,loc,saKey}=sheet;
    if(!next[segId])next[segId]={};
    if(!next[segId][loc])next[segId][loc]={};
    next[segId][loc][saKey]=pickDate?{type:"day",value:pickDate}:{type:"week",value:pickWk};
    await savePlan(next);setSheet(null);flash("✅ Saved");
  }
  async function clearPlanSheet(){
    const next=JSON.parse(JSON.stringify(planData||{}));
    const{segId,loc,saKey}=sheet;
    if(next[segId]?.[loc]) delete next[segId][loc][saKey];
    await savePlan(next);setSheet(null);flash("✅ Cleared");
  }

  // ── Get towers for a given export scope ──────────────────────────────────
  function getScopeUnits(scope){
    const cs=config.segments.find(s=>s.id===seg);
    const sas=config.subActivities;
    return (cs?.units||[]).filter(u=>
      sas.some(sa=>{ const p=getPlan(seg,u.loc,sa.key); return p&&planMatchesScope(p,scope); })
    );
  }

  function planMatchesScope(plan,scope){
    if(!plan) return false;
    if(scope.type==="current") return planMatchesSel(plan,viewSel);
    if(scope.type==="all") return true;
    if(scope.type==="weeks") return scope.weeks.some(wk=>planMatchesSel(plan,wk));
    if(scope.type==="month") return planMatchesSel(plan,scope.month);
    if(scope.type==="3month") return scope.months.some(mo=>planMatchesSel(plan,mo));
    if(scope.type==="daterange"){
      let planDate="";
      if(plan.type==="day") planDate=plan.value;
      if(plan.type==="week"){
        const wkNum=parseInt(plan.value.slice(1));
        const yr=scope.from?parseInt(scope.from.split("-")[0]):curYr;
        const ws=weekStart(yr,wkNum);
        planDate=`${ws.getUTCFullYear()}-${pad(ws.getUTCMonth()+1)}-${pad(ws.getUTCDate())}`;
      }
      if(!planDate) return false;
      return planDate>=scope.from&&planDate<=scope.to;
    }
    return false;
  }

  function getScopeLabel(scope){
    if(scope.type==="current") return getViewLabel();
    if(scope.type==="all") return "All Plans";
    if(scope.type==="weeks") return scope.weeks.join("+");
    if(scope.type==="month"){ const mt=monthTabs.find(t=>t.key===scope.month); return mt?mt.label:scope.month; }
    if(scope.type==="3month") return scope.months.map(mo=>{ const mt=monthTabs.find(t=>t.key===mo); return mt?mt.label.split(" ")[0]:mo; }).join("+");
    if(scope.type==="daterange") return `${fmtD(scope.from)}_${fmtD(scope.to)}`;
    return "";
  }

  function buildPNGHtml(scope){
    const cs=config.segments.find(s=>s.id===seg);

    const lbl=getScopeLabel(scope);
    if(!units.length) return null;

    }).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;padding:20px;}.page{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,0.18);display:inline-block;min-width:100%;}.hdr{background:linear-gradient(135deg,#1a3a5c,#2a5a9a);padding:16px 22px;display:flex;justify-content:space-between;align-items:flex-start;}.brand{color:#fff;font-size:18px;font-weight:900;}.brand em{color:#e07b00;font-style:normal;}.meta{color:rgba(255,255,255,0.6);font-size:10px;margin-top:3px;}.rpt{color:#fff;font-size:14px;font-weight:800;margin-top:5px;}.badge{background:rgba(255,255,255,0.2);border-radius:6px;padding:3px 12px;color:#fff;font-size:11px;font-weight:700;display:inline-block;}.leg{padding:7px 22px;background:#f8f9fc;border-bottom:2px solid #1a3a5c;display:flex;gap:14px;align-items:center;font-size:10px;color:#546e7a;}table{width:100%;border-collapse:collapse;}.footer{padding:8px 22px;text-align:center;font-size:9px;color:#8090b0;border-top:2px solid #1a3a5c;}</style></head><body><div class="page"><div class="hdr"><div><div class="brand">L<em>&amp;</em>T CONSTRUCTION</div><div class="meta">${project.name} · ${mainActivity.name} · ${cs?.name}</div><div class="rpt">&#x1F4C6; PLANNING MATRIX</div></div><div style="text-align:right;"><div class="badge">${lbl}</div><div style="color:rgba(255,255,255,0.5);font-size:9px;margin-top:5px;">${units.length} towers · ${sas.length} activities</div></div></div><div class="leg"><span style="display:inline-flex;align-items:center;gap:4px;"><span style="background:#eafaf0;border:1.5px solid #3fb950;border-radius:3px;padding:1px 5px;color:#1a7a35;font-weight:700;font-size:10px;">&#x2713;</span>Done</span><span style="display:inline-flex;align-items:center;gap:4px;"><span style="background:#fff9c4;border:1.5px solid #f9a825;border-radius:3px;padding:1px 5px;color:#e65100;font-weight:700;font-size:10px;">W16</span>Planned</span><span style="margin-left:auto;">${new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</span></div><table><thead><tr><th style="padding:9px 14px;background:#22395a;color:#fff;font-size:10px;font-weight:700;text-align:left;border-right:2px solid rgba(255,255,255,0.2);min-width:160px;white-space:nowrap;">ACTIVITY</th>${thCells}</tr></thead><tbody>${dataRows}</tbody></table><div class="footer">MEW-5991 · L&amp;T Construction · ${new Date().toLocaleString("en-GB")}</div></div></body></html>`;
    return {html,units,lbl};
  }

  function runPNG(scope){
    if(!window.html2canvas){flash("html2canvas not loaded");return;}
    const result=buildPNGHtml(scope);
    if(!result){flash("No towers found for this scope");return;}
    const {html,units,lbl}=result;
    const iframe=document.createElement("iframe");
    iframe.style.cssText="position:fixed;left:-9999px;top:-9999px;width:1600px;height:1px;border:none;";
    document.body.appendChild(iframe);
    iframe.contentDocument.open(); iframe.contentDocument.write(html); iframe.contentDocument.close();
    setTimeout(()=>{
      const pg=iframe.contentDocument.querySelector(".page");
      if(!pg){document.body.removeChild(iframe);flash("PNG error");return;}
      iframe.style.height=(pg.scrollHeight+60)+"px";
      setTimeout(()=>{
        window.html2canvas(pg,{scale:2,useCORS:true,backgroundColor:"#eef2f7",logging:false}).then(canvas=>{
          const a=document.createElement("a");
          a.download=`Planning-${lbl.replace(/[^a-zA-Z0-9+\-]/g,"_")}.png`;
          a.href=canvas.toDataURL("image/png"); a.click();
          document.body.removeChild(iframe); flash("\u{1F4F7} PNG downloaded!");
        }).catch(err=>{document.body.removeChild(iframe);flash("Error: "+err.message);});

  function runExcel(scope){
    if(!window.XLSX){flash("XLSX not loaded");return;}

    const cs=config.segments.find(s=>s.id===seg);
    const sas=config.subActivities;

    const lbl=getScopeLabel(scope);
    if(!units.length){flash("No towers found for this scope");return;}
    const rows=[[`MEW-5991 · Erection · ${cs?.name} · ${lbl}`],[],["ACTIVITY",...units.map(u=>u.loc)],["TYPE",...units.map(u=>u.type||"\u2013")],...sas.map(sa=>[sa.name,...units.map(u=>{ if(isDone(seg,u.loc,sa.key)) return "\u2713 Done"; const p=getPlan(seg,u.loc,sa.key); if(!p||!planMatchesScope(p,scope)) return ""; return p.type==="day"?fmtD(p.value):p.value; })])];
